version: '3.7'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: iaskryanov_av-netology-prometheus
    volumes:
      - ./prometheus/:/etc/prometheus/
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - 9090:9090
    networks:
      - iskryanov-my-netology-hw
    restart: always
    depends_on:
      - pushgateway
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  pushgateway:
    image: prom/pushgateway:latest
    container_name: iskryanov_av-netology-pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    volumes:
      - pushgateway-data:/data
    networks:
      - iskryanov-my-netology-hw
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: iskryanov_av-netology-grafana
    restart: unless-stopped
    ports:
      - "8080:3000"
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_CONFIG_FILE=/etc/grafana/grafana.ini
    networks:
      - iskryanov-my-netology-hw
    depends_on:
      prometheus:
        condition: service_healthy
      pushgateway:
        condition: service_healthy


volumes:
  prometheus-data:
    driver: local
  pushgateway-data:
    driver: local
  grafana-data:
    driver: local

networks:
  iskryanov-my-netology-hw:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/16
          gateway: 10.5.0.1